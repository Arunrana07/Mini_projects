<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>URL Shortener</h1>

      <form id="shorten-form">
        <input
          type="text"
          name="url"
          placeholder="Enter URL to shorten"
          required
        />

        <div>
          <input
            type="text"
            name="shortCode"
            placeholder="Enter custom short code"
          />
        </div>

        <button type="submit">Shorten</button>
      </form>

      <div id="result" style="margin-top: 20px"></div>

      <h3>Features</h3>
      <ul>
        <li>Shorten long URLs to a more manageable format.</li>
        <li>Track the number of clicks on each shortened URL.</li>
        <li>Provide analytics on URL usage.</li>
      </ul>
    </div>

    <script>
      document
        .getElementById("shorten-form")
        .addEventListener("submit", async (event) => {
          event.preventDefault();

          const formData = new FormData(event.target);

          const url = formData.get("url");
          const shortCode = formData.get("shortCode");

          try {
            const response = await fetch("/shorten", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                url,
                shortCode,
              }),
            });

            const resultDiv = document.getElementById("result");

            if (response.ok) {
              const data = await response.json();

              resultDiv.innerHTML = `
              <p style="color:green; font-weight:bold;">
                URL Shortened Successfully ✅
              </p>

              <p>
                Short URL:
                <a href="${data.shortUrl}" target="_blank">
                  ${data.shortUrl}
                </a>
              </p>
            `;

              event.target.reset();
            } else {
              const errorMessage = await response.text();

              resultDiv.innerHTML = `
              <p style="color:red; font-weight:bold;">
                ${errorMessage}
              </p>
            `;
            }
          } catch (error) {
            console.error(error);

            document.getElementById("result").innerHTML = `
            <p style="color:red;">
              Something went wrong!
            </p>
          `;
          }
        });
    </script>
  </body>
</html>
